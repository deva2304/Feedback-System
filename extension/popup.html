<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #f9f9f9; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #232f3e; font-size: 16px; border-bottom: 2px solid #ff9900; padding-bottom: 5px; }
        .product-name { font-weight: bold; color: #555; margin-bottom: 10px; font-size: 14px; }
        .score-box { text-align: center; margin-top: 20px; }
        .score { font-size: 42px; font-weight: 800; color: #ff9900; line-height: 1; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .status { margin-top: 15px; font-size: 11px; color: #4CAF50; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Amazon Safe Tracker</h3>
        <div id="product" class="product-name">Waiting for product...</div>
        
        <div class="score-box">
            <div id="score" class="score">--%</div>
            <div class="label">Chance of Purchase</div>
        </div>
        
        <div class="status">● Connected to Flask Server</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
